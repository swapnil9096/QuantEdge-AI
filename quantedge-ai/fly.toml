# fly.toml — QuantEdge AI on Fly.io.
#
# Replace `app = "quantedge-REPLACE-ME"` below with the name you pick during
# `fly launch --copy-config`. Fly requires globally-unique app names; something
# like `quantedge-<yourname>` usually works.
#
# Mumbai region (bom) = closest edge to NSE data sources; swap for any other
# code in `fly platform regions` if you prefer.

app = "quantedge-REPLACE-ME"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  SESSION_TTL_HOURS = "24"
  PORT = "8000"

  # These non-secrets can live here; rotate via `fly secrets set` when needed.
  PAPER_CAPITAL = "1000000"
  PAPER_RISK_PCT = "2.0"
  PAPER_MAX_OPEN = "5"
  PAPER_MAX_HOLD_DAYS = "20"
  PAPER_MONITOR_INTERVAL = "60"
  AUTO_PAPER_TRADE_ENABLED = "true"
  AUTO_PAPER_TRADE_THRESHOLD = "70"
  AUTO_TRADE_MARKET_OPEN_ONLY = "false"

  # Telegram chat id is not secret on its own; the bot token lives in the vault.
  TELEGRAM_CHAT_ID = "1681623488"

# -----------------------------------------------------------------------------
# Single always-on machine. We keep `auto_stop_machines = "off"` because the
# background paper-trade monitor needs to run 24/7 to fire stops/targets; if
# Fly stops the machine on idle the monitor dies.
# -----------------------------------------------------------------------------
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# -----------------------------------------------------------------------------
# Persistent volume for the SQLite DB + any local caches. Mounted over
# backend/data/ so everything runtime-generated survives deploys.
# -----------------------------------------------------------------------------
[[mounts]]
  source = "quantedge_data"
  destination = "/app/backend/data"
  initial_size = "1"

# -----------------------------------------------------------------------------
# VM sizing. 256 MB is within the free tier and enough for this workload.
# Bump to 512 or 1024 if `fly logs` shows OOM-kills during backtests.
# -----------------------------------------------------------------------------
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# -----------------------------------------------------------------------------
# Deploy strategy: rolling single-machine is fine (we only have one).
# For zero-downtime later, scale to 2 and switch to "bluegreen".
# -----------------------------------------------------------------------------
[deploy]
  strategy = "rolling"
